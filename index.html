<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@2.51.3/dist/full.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tw-elements/dist/css/index.min.css" />
    <title>Ai Universe</title>
</head>

<body>
    <header class="text-center mt-4 mb-4">
        <h1 class="font-bold text-4xl">AI Universe hub</h1>
        <button class="mt-3 btn btn-primary">Sort by Date</button>
    </header>

    <main>
        <section id="card-container" class="mx-16 grid grid-cols-3 ">

        </section>


        <section id="button" class="flex justify-center mt-4 mb-4 hidden">
            <button onclick="showAll()" class="btn btn-primary">Show More</button>
        </section>

        <section>
            <!-- Put this part before </body> tag -->
            <input type="checkbox" id="my-modal-3" class="modal-toggle" />
            <div class="modal">
                <div class="modal-box w-[110%] h-[72%] max-w-5xl">
                    <label for="my-modal-3" class="btn btn-sm btn-circle absolute right-2 top-2">✕</label>
                    <div class="flex justify-center content-center gap-8">
                        <div>
                            <div class="card w-96 shadow-xl bg-red-50 border-2 border-red-400">
                                <div class="card-body">
                                    <h2 id="title" class="text-lg font-bold"></h2>
                                    <div class="grid  grid-cols-3 mt-2">
                                        <div
                                            class=" px-4 bg-slate-100 h-20 w-24 text-sm text-center font-bold text-green-600">
                                            <span id="price-1">$10/ month</span> <span id="plan1">Basic</span>
                                        </div>
                                        <div
                                            class=" px-4 bg-slate-100 h-20 w-24 text-sm text-center font-bold text-amber-600">
                                            <span id="price-2">$10/ month</span> <span id="plan2">Basic</span>
                                        </div>
                                        <div
                                            class=" px-4 bg-slate-100 h-20 w-24 text-sm text-center font-bold text-rose-600">
                                            <span id="price-3">$10/ month</span> <span id="plan3">Basic</span>
                                        </div>

                                    </div>

                                    <div class="flex justify-between mt-3">
                                        <div>
                                            <h1 id="feature" class="text-xl font-bold">Features</h1>
                                            <ul class="list-disc pl-6 mt-3 text-sm">
                                                <li id="f-1">one</li>
                                                <li id="f-2">two</li>
                                                <li id="f-3">three</li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h1 id="intreg" class="text-xl font-bold">Integration</h1>
                                            <ul class="list-disc pl-6 mt-3 text-sm">
                                                <li id="i-1">one</li>
                                                <li id="i-2">two</li>
                                                <li id="i-3">three</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="card card-compact w-96 bg-base-100 shadow-xl">
                                <figure class="px-6 "><img id="modalpic" class="h-[50%] rounded-lg" src=""
                                        alt="Shoes" />
                                </figure>
                                <div class="card-body">
                                    <h2 id="right-title" class="text-2xl font-bold text-center">Shoes!</h2>
                                    <p id="para" class="text-center">If a dog chews shoes whose shoes does he choose?
                                    </p>
                                    <div class="">
                                        <!-- <button class="btn btn-primary -translate-y-80 translate-x-56">Buy Now</button> -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <script src="./index.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com/3.2.4"></script>
    <script src="https://kit.fontawesome.com/f88da861d2.js" crossorigin="anonymous"></script>
</body>

</html>
