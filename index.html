<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@2.51.3/dist/full.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tw-elements/dist/css/index.min.css" />
    <title>Ai Universe</title>
</head>

<body>
    <header class="text-center mt-4 mb-4">
        <h1 class="font-bold text-4xl">AI Universe hub</h1>
        <button class="mt-3 btn btn-primary">Sort by Date</button>
    </header>

    <main>
        <section id="card-container" class="w-full grid lg:grid-cols-3 ">

        </section>


        <section id="button" class="flex justify-center mt-4 mb-4 hidden">
            <button onclick="showAll()" class="btn btn-primary">Show More</button>
        </section>

        <section>
            
            <input type="checkbox" id="my-modal-3" class="modal-toggle" />
            <div class="modal">
                <div class="modal-box w-[100%] h-[100%] flex justify-center items-center max-w-5xl">
                    <label for="my-modal-3" class="btn btn-sm btn-circle absolute right-2 top-2">✕</label>
                    <div class=" grid lg:flex lg:justify-center lg:content-center lg:mt-0 gap-8">
                        <div>
                            <div class="card w-96 h-[100%] h-full  shadow-xl bg-red-50 border-2 border-red-400">
                                <div class="card-body">
                                    <h2 id="title" class="text-xl font-bold"></h2>
                                    <div id="pricing-container" class="grid  grid-cols-3 mt-4">
                                        
                                    </div>

                                    <div class="flex justify-between mt-3">
                                        <div>
                                            <h1  class="text-xl font-bold">Features</h1>
                                            <ul id="feature" class="list-disc pl-6 mt-3 text-sm">

                                            </ul>
                                        </div>
                                        <div>
                                            <h1 class="text-xl font-bold">Integration</h1>
                                            <ul id="integ" class="list-disc pl-6 mt-3 text-sm">
                                                
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="right-card">
                        
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="spinner" class="hidden">
            <div class="flex items-center justify-center space-x-2">
                <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-current border-r-transparent align-[-0.125em] text-primary motion-reduce:animate-[spin_1.5s_linear_infinite]"
                    role="status">
                    <span
                        class="!absolute !-m-px !h-px !w-px !overflow-hidden !whitespace-nowrap !border-0 !p-0 ![clip:rect(0,0,0,0)]">Loading...</span>
                </div>
        </section>
    </main>


    <script src="./index.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com/3.2.4"></script>
    <script src="https://kit.fontawesome.com/f88da861d2.js" crossorigin="anonymous"></script>
</body>

</html>
